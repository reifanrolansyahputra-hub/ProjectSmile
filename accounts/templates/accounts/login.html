{% extends 'base.html' %}

{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}

<div class="login-container">

    <div class="login-box">

        <h2>😊 Project Smile</h2>

        <p class="subtitle">
            Silakan login untuk melanjutkan
        </p>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input
                    type="text"
                    name="username"
                    placeholder="Masukkan username"
                    required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Masukkan password"
                    required>
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <a href="/" class="back-home">
            ← Kembali ke Beranda
        </a>

    </div>

</div>

{% endblock %}
